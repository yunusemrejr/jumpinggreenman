
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jumping Greenman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #2a2a3a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Patrick Hand', cursive;
  overflow: hidden;
}
#gameWrapper {
  position: relative;
  width: 420px;
  height: 680px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow:
    0 0 0 3px #8B7355,
    0 0 0 6px #6B5335,
    0 20px 60px rgba(0,0,0,0.5);
}
canvas {
  display: block;
  width: 420px;
  height: 680px;
}
#scoreDisplay {
  position: absolute;
  top: 14px;
  left: 50px;
  font-family: 'Gaegu', cursive;
  font-size: 28px;
  font-weight: 700;
  color: #444;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
  pointer-events: none;
  z-index: 10;
}
#highScoreDisplay {
  position: absolute;
  top: 16px;
  right: 16px;
  font-family: 'Gaegu', cursive;
  font-size: 18px;
  color: #999;
  pointer-events: none;
  z-index: 10;
}
#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(255, 248, 230, 0.93);
  z-index: 20;
}
#overlay h1 {
  font-family: 'Gaegu', cursive;
  font-size: 52px;
  font-weight: 700;
  color: #333;
  margin-bottom: 6px;
  transform: rotate(-3deg);
}
.subtitle {
  font-family: 'Patrick Hand', cursive;
  font-size: 20px;
  color: #999;
  margin-bottom: 28px;
}
.instructions {
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;
  color: #666;
  text-align: center;
  line-height: 1.7;
  margin-bottom: 24px;
}
.key-hint {
  display: inline-block;
  background: #eee;
  border: 2px solid #ccc;
  border-radius: 6px;
  padding: 2px 10px;
  font-family: 'Gaegu', cursive;
  font-weight: 700;
  font-size: 16px;
  margin: 0 2px;
}
.start-btn {
  font-family: 'Gaegu', cursive;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  background: #5a9e6f;
  border: 3px solid #3d7a4f;
  border-radius: 12px;
  padding: 10px 40px;
  cursor: pointer;
  transition: transform 0.15s, background 0.15s;
}
.start-btn:hover {
  transform: scale(1.05);
  background: #4d8a60;
}
#finalScore {
  font-family: 'Gaegu', cursive;
  font-size: 64px;
  font-weight: 700;
  color: #e07040;
  margin: 8px 0;
}
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="game" width="420" height="680"></canvas>
  <div id="scoreDisplay">0</div>
  <div id="highScoreDisplay"></div>
  <div id="overlay">
    <h1>Jumping Greenman</h1>
    <div class="subtitle">~ jump your way to the sky! ~</div>
    <div class="instructions">
      <span class="key-hint">&larr;</span> <span class="key-hint">&rarr;</span> or
      <span class="key-hint">A</span> <span class="key-hint">D</span> to move<br>
      Jump higher and higher!
    </div>
    <button class="start-btn" id="startBtn">Let's Go!</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 420, H = 680;
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('scoreDisplay');
const highScoreEl = document.getElementById('highScoreDisplay');
const startBtn = document.getElementById('startBtn');

let highScore = parseInt(localStorage.getItem('jumpingGreenmanHigh') || '0');
if (highScore > 0) highScoreEl.textContent = `Best: ${highScore}`;

const PAPER = '#FFF8E6';
const GRID_LINE = '#e8e0d0';
const MARGIN_LINE = '#e8a0a0';
const PLAT_COLS = ['#7BC67E','#E8A87C','#85C1E9','#F7DC6F','#C39BD3'];
const PLAT_BORD = ['#4a9a4d','#c0805a','#5a9ac0','#c0a840','#9a6db0'];

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5)*4;
    this.vy = -Math.random()*3-1;
    this.life = 1;
    this.decay = 0.025+Math.random()*0.02;
    this.size = 3+Math.random()*4;
    this.color = color;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life-=this.decay; }
  draw() {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class Doodler {
  constructor() {
    this.x = W/2; this.y = H-100;
    this.vx = 0; this.vy = 0;
    this.dir = 1;
    this.jumpPow = -13;
    this.gravity = 0.45;
    this.speed = 5.5;
    this.alive = true;
    this.blink = 0;
    this.squish = 0;
  }
  update() {
    if (!this.alive) return;
    if (keys['ArrowLeft']||keys['KeyA']) { this.vx=-this.speed; this.dir=-1; }
    else if (keys['ArrowRight']||keys['KeyD']) { this.vx=this.speed; this.dir=1; }
    else { this.vx*=0.85; }
    this.x += this.vx;
    this.vy += this.gravity;
    this.y += this.vy;
    if (this.x < -22) this.x = W+22;
    if (this.x > W+22) this.x = -22;
    this.blink--;
    if (this.blink < -120 && Math.random()<0.02) this.blink = 6;
    this.squish *= 0.85;
  }
  jump(pow) {
    this.vy = pow || this.jumpPow;
    this.squish = 1;
  }
  draw() {
    const sx = 1+this.squish*0.3, sy = 1-this.squish*0.2;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(this.dir*sx, sy);
    // Body
    ctx.fillStyle='#8BC34A'; ctx.strokeStyle='#558B2F'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.ellipse(0,2,20,18,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Belly
    ctx.fillStyle='#C5E1A5';
    ctx.beginPath(); ctx.ellipse(0,8,12,8,0,0,Math.PI*2); ctx.fill();
    // Eyes
    const ey=-4, bl=this.blink>0;
    ctx.fillStyle='#fff'; ctx.strokeStyle='#444'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(-7,ey,6,bl?1:6,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(7,ey,6,bl?1:6,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    if (!bl) {
      ctx.fillStyle='#333';
      ctx.beginPath(); ctx.arc(-5,ey,2.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(9,ey,2.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(-4,ey-1.5,1,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(10,ey-1.5,1,0,Math.PI*2); ctx.fill();
    }
    // Mouth
    ctx.strokeStyle='#558B2F'; ctx.lineWidth=2; ctx.lineCap='round';
    if (this.vy<-5) {
      ctx.fillStyle='#E57373';
      ctx.beginPath(); ctx.ellipse(1,10,5,4,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(1,8,5,0.1,Math.PI-0.1); ctx.stroke();
    }
    // Feet
    ctx.fillStyle='#F57F17'; ctx.strokeStyle='#E65100'; ctx.lineWidth=2;
    const fb=Math.sin(Date.now()*0.01)*2;
    ctx.beginPath(); ctx.ellipse(-10,18+(this.vy<0?fb:0),8,4,-0.2,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(10,18+(this.vy<0?-fb:0),8,4,0.2,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Antennae
    ctx.strokeStyle='#558B2F'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-6,-16); ctx.quadraticCurveTo(-10,-28,-14,-26); ctx.stroke();
    ctx.fillStyle='#F44336'; ctx.beginPath(); ctx.arc(-14,-26,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(6,-16); ctx.quadraticCurveTo(10,-30,16,-27); ctx.stroke();
    ctx.fillStyle='#F44336'; ctx.beginPath(); ctx.arc(16,-27,3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

class Platform {
  constructor(x, y, type) {
    this.x=x; this.y=y; this.w=70; this.h=16;
    this.type=type||'normal';
    this.ci=Math.floor(Math.random()*PLAT_COLS.length);
    this.broken=false; this.breakT=0;
    this.mvDir=(Math.random()>0.5?1:-1)*(1+Math.random());
    this.springBounce=0;
  }
  update() {
    if (this.type==='move'&&!this.broken) {
      this.x+=this.mvDir;
      if (this.x<this.w/2||this.x>W-this.w/2) this.mvDir*=-1;
    }
    if (this.broken) { this.breakT++; this.y+=this.breakT*0.8; }
    this.springBounce*=0.8;
  }
  draw() {
    if (this.broken&&this.breakT>30) return;
    ctx.save(); ctx.translate(this.x,this.y);
    if (this.broken) ctx.globalAlpha=Math.max(0,1-this.breakT/30);
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.08)';
    roundRect(-this.w/2+2,-this.h/2+3,this.w,this.h,8); ctx.fill();
    // Body
    ctx.fillStyle=PLAT_COLS[this.ci]; ctx.strokeStyle=PLAT_BORD[this.ci]; ctx.lineWidth=2.5;
    roundRect(-this.w/2,-this.h/2,this.w,this.h,8); ctx.fill(); ctx.stroke();
    // Highlight
    ctx.fillStyle='rgba(255,255,255,0.3)';
    roundRect(-this.w/2+3,-this.h/2+2,this.w-6,this.h*0.45,4); ctx.fill();
    if (this.type==='break') {
      ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(-this.w/4,-this.h/2+2); ctx.lineTo(-this.w/4+5,this.h/2-2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(this.w/6,-this.h/2+3); ctx.lineTo(this.w/6-4,this.h/2-1); ctx.stroke();
      ctx.setLineDash([]);
    }
    if (this.type==='move') {
      ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.font='10px Patrick Hand'; ctx.textAlign='center';
      ctx.fillText('◄ ►',0,4);
    }
    if (this.type==='spring') {
      const sx=this.w/2-14, sh=18-this.springBounce*8;
      ctx.strokeStyle='#888'; ctx.lineWidth=2.5;
      for (let i=0;i<4;i++) {
        const yy=-this.h/2-i*(sh/4);
        ctx.beginPath(); ctx.moveTo(sx-6,yy); ctx.lineTo(sx+6,yy-sh/8); ctx.stroke();
      }
      ctx.fillStyle='#E53935'; ctx.strokeStyle='#B71C1C'; ctx.lineWidth=2;
      roundRect(sx-10,-this.h/2-sh-4,20,8,3); ctx.fill(); ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.restore();
  }
}

// === GAME STATE ===
let doodler, platforms, particles, score, camY, maxHeight, running, gameOver, topPlatY;

function pickType() {
  const diff = Math.min(score/3000, 1);
  const r = Math.random();
  if (r < 0.04 + diff*0.1) return 'break';
  if (r < 0.08 + diff*0.12) return 'move';
  if (r < 0.11) return 'spring';
  return 'normal';
}

function makePlatform(x, y) {
  platforms.push(new Platform(x, y, pickType()));
}

function initGame() {
  doodler = new Doodler();
  platforms = [];
  particles = [];
  score = 0;
  camY = 0;
  maxHeight = H;
  gameOver = false;
  running = false;

  platforms.push(new Platform(W/2, H-50, 'normal'));
  let y = H - 120;
  topPlatY = y;
  while (y > -300) {
    const x = 40 + Math.random()*(W-80);
    makePlatform(x, y);
    y -= 55 + Math.random()*45;
    topPlatY = Math.min(topPlatY, y);
  }
  scoreEl.textContent = '0';
}

function addMorePlatforms() {
  const target = camY - 300;
  while (topPlatY > target) {
    const x = 40 + Math.random()*(W-80);
    makePlatform(x, topPlatY);
    topPlatY -= 55 + Math.random()*45;
  }
}

function spawnParticles(x, y, color, n) {
  for (let i=0;i<n;i++) particles.push(new Particle(x,y,color));
}

function update() {
  if (!running || gameOver) return;
  doodler.update();

  const targetY = doodler.y - H*0.4;
  if (targetY < camY) camY += (targetY-camY)*0.12;

  const h = H - doodler.y;
  if (h > maxHeight) {
    maxHeight = h;
    score = Math.floor(maxHeight/2);
    scoreEl.textContent = score;
  }

  if (doodler.vy > 0) {
    for (const p of platforms) {
      if (p.broken) continue;
      const dx = doodler.x - p.x;
      const feetY = doodler.y + 22;
      const platTop = p.y - p.h/2;
      if (Math.abs(dx) < p.w/2+8 && feetY >= platTop-8 && feetY <= platTop+12) {
        if (p.type === 'break') {
          p.broken = true;
          spawnParticles(p.x, p.y, PLAT_COLS[p.ci], 6);
        } else {
          doodler.jump(p.type==='spring' ? -20 : doodler.jumpPow);
          if (p.type==='spring') p.springBounce=1;
          spawnParticles(doodler.x, p.y-10, '#fff', 4);
        }
      }
    }
  }

  for (const p of platforms) p.update();
  for (const p of particles) p.update();
  particles = particles.filter(p=>p.life>0);
  platforms = platforms.filter(p=>p.y < camY+H+100);
  addMorePlatforms();

  if (doodler.y > camY+H+60) {
    gameOver = true;
    running = false;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('jumpingGreenmanHigh', highScore);
    }
    showGameOver();
  }
}

// === RENDER ===
function drawBackground() {
  // Paper
  ctx.fillStyle = PAPER;
  ctx.fillRect(0,0,W,H);

  // Grid
  const gs = 24;
  const oy = (-camY*0.3)%gs;
  ctx.strokeStyle = GRID_LINE;
  ctx.lineWidth = 0.5;
  for (let x=0;x<=W;x+=gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=oy-gs;y<=H+gs;y+=gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Margin
  ctx.strokeStyle = MARGIN_LINE; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(38,0); ctx.lineTo(38,H); ctx.stroke();

  // Holes
  const ho = (-camY*0.2)%120;
  for (let y=ho-120;y<H+120;y+=120) {
    ctx.fillStyle='#2a2a3a'; ctx.beginPath(); ctx.arc(14,y,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=PAPER; ctx.beginPath(); ctx.arc(14,y,5,0,Math.PI*2); ctx.fill();
  }
}

function draw() {
  // *** FIX: Explicitly wipe the entire canvas every frame ***
  ctx.clearRect(0, 0, W, H);

  drawBackground();

  ctx.save();
  ctx.translate(0, -camY);

  for (const p of platforms) {
    if (p.y > camY-50 && p.y < camY+H+50) p.draw();
  }
  for (const p of particles) p.draw();
  if (doodler && !gameOver) doodler.draw();

  ctx.restore();
}

function showGameOver() {
  setTimeout(() => {
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <h1 style="font-size:44px; color:#c0392b;">Game Over!</h1>
      <div class="subtitle">ouch, missed a platform!</div>
      <div id="finalScore">${score}</div>
      <div class="instructions" style="margin-bottom:8px;">
        ${score>=highScore&&score>0?'⭐ New High Score! ⭐':'Best: '+highScore}
      </div>
      <button class="start-btn" id="restartBtn">Try Again</button>
    `;
    document.getElementById('restartBtn').addEventListener('click', startGame);
  }, 500);
}

function startGame() {
  overlay.style.display = 'none';
  if (highScore > 0) highScoreEl.textContent = `Best: ${highScore}`;
  initGame();
  running = true;
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', startGame);

initGame();
draw();
loop();
</script>
</body>
</html>
